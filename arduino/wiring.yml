metadata:
  title: GeoGreen - Cableado del modulo (Arduino Nano + 3xAAA)

options:
  bgcolor: WH
  fontname: Arial

connectors:
  ARDUINO:
    type: Arduino Nano
    pinlabels: [VIN, 5V, GND, D2, D3, D4, D8, D9, D10]
  BATERIA:
    type: Porta-pilas 3xAAA (4.5V)
    pinlabels: ['+', '-']
  SW:
    type: Interruptor ON/OFF
    pinlabels: ['1', '2']
  SENSOR:
    type: HC-SR04
    pinlabels: [VCC, TRIG, ECHO, GND]
  LED_R:
    type: LED rojo
    notes: nivel alto / lleno
    pinlabels: [A, C]
    additional_components:
      - type: Resistencia
        subtype: 220 ohm
  LED_A:
    type: LED amarillo
    notes: nivel medio
    pinlabels: [A, C]
    additional_components:
      - type: Resistencia
        subtype: 220 ohm
  LED_V:
    type: LED verde
    notes: nivel bajo
    pinlabels: [A, C]
    additional_components:
      - type: Resistencia
        subtype: 220 ohm
  BUZZER:
    type: Buzzer activo 5V
    pinlabels: ['+', '-']

cables:
  W_SENSOR:
    colors: [RD, BU, GN, BK]
  W_R:
    colors: [OG, BK]
  W_A:
    colors: [YE, BK]
  W_V:
    colors: [GN, BK]
  W_BZ:
    colors: [VT, BK]
  W_PWR:
    colors: [RD, BK]
  W_SW:
    colors: [RD]

connections:
  # Alimentacion: bateria -> interruptor -> VIN, y retorno GND
  -
    - BATERIA: ['+']
    - W_SW: [1]
    - SW: ['1']
  -
    - SW: ['2']
    - W_PWR: [1]
    - ARDUINO: [VIN]
  -
    - BATERIA: ['-']
    - W_PWR: [2]
    - ARDUINO: [GND]
  # Sensor (alimentado desde 5V del Nano)
  -
    - ARDUINO: [5V, D9, D10, GND]
    - W_SENSOR: [1, 2, 3, 4]
    - SENSOR: [VCC, TRIG, ECHO, GND]
  -
    - ARDUINO: [D2, GND]
    - W_R: [1, 2]
    - LED_R: [A, C]
  -
    - ARDUINO: [D3, GND]
    - W_A: [1, 2]
    - LED_A: [A, C]
  -
    - ARDUINO: [D4, GND]
    - W_V: [1, 2]
    - LED_V: [A, C]
  -
    - ARDUINO: [D8, GND]
    - W_BZ: [1, 2]
    - BUZZER: ['+', '-']
